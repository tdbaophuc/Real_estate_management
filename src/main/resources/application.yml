spring:
  application:
    name: real-estate-management
  profiles:
    default: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-version: 0
    validate-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:10MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:11MB}

server:
  port: ${SERVER_PORT:8081}

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:PT30M}
      refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:P30D}
  storage:
    local-root: ${LOCAL_STORAGE_ROOT:./var/storage}
    max-file-size: ${MAX_UPLOAD_SIZE:10MB}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - application/pdf

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
